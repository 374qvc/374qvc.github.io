<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rbx Exploits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #e0e0e0;
            font-family: 'Yu Gothic', 'YuGothic', 'Noto Sans CJK JP', 'Segoe UI', 'Meiryo', sans-serif;
            font-weight: normal;
            line-height: 1.5;
            padding: 2rem 1.5rem;
        }

        .master-layout {
            max-width: 1450px;
            margin: 0 auto;
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            position: relative;
        }

        /* ========= ВЕРТИКАЛЬНЫЕ ТАБЫ (СЛЕВА) ========= */
        .tabs-vertical {
            flex-shrink: 0;
            width: 160px;
            background-color: #030303;
            border: 1px solid #222;
            border-radius: 0px;
            padding: 1rem 0;
            position: sticky;
            top: 1rem;
            box-shadow: 4px 0 12px rgba(0,0,0,0.6);
        }

        .tab-btn {
            width: 100%;
            background: transparent;
            border: none;
            text-align: left;
            padding: 12px 18px;
            font-family: 'Yu Gothic', monospace;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s ease;
            border-left: 3px solid transparent;
            margin-bottom: 4px;
        }

        .tab-btn:hover {
            background-color: #111;
            color: #f0f0f0;
            border-left-color: #666;
        }

        .tab-btn.active {
            background-color: #0a0a0a;
            color: #ffffff;
            border-left-color: #ffffff;
            text-shadow: 0 0 2px rgba(255,255,255,0.4);
            box-shadow: -2px 0 4px rgba(255,255,255,0.05);
        }

        .right-zone {
            flex: 1;
            min-width: 0;
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        .content {
            flex: 2;
            min-width: 0;
        }

        .sidebar {
            flex: 0.8;
            background-color: #050505;
            border: 1px solid #2a2a2a;
            padding: 1.2rem;
            position: sticky;
            top: 1rem;
            max-height: 90vh;
            overflow-y: auto;
        }

        .search-section {
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 1rem;
        }

        .search-section h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            letter-spacing: 1px;
            color: #cccccc;
        }

        #searchInput {
            width: 100%;
            background-color: #0a0a0a;
            border: 1px solid #3a3a3a;
            padding: 0.6rem 0.8rem;
            color: white;
            font-family: 'Yu Gothic', monospace;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
        }

        #searchInput:focus {
            border-color: #7a7a7a;
            background-color: #111;
        }

        /* Блок выбора фильтра рангов — новый элемент управления */
        .rank-filter-section {
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 1rem;
        }
        .rank-filter-section h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            letter-spacing: 1px;
            color: #cccccc;
        }
        .rank-filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .rank-filter-btn {
            background-color: #111;
            border: 1px solid #333;
            color: #ccc;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .rank-filter-btn.active-filter {
            background-color: #2a2a2a;
            border-color: #fff;
            color: white;
            box-shadow: 0 0 4px rgba(255,255,255,0.3);
        }
        .rank-filter-btn[data-filter="none"] {
            border-color: #444;
            color: #aaa;
        }
        .rank-filter-btn[data-filter="none"].active-filter {
            background-color: #1f1f1f;
            border-color: #888;
            color: #ddd;
        }

        /* Стили для рангового сайдбара (low/mid/high) */
        .rank-section {
            margin-bottom: 1.8rem;
        }
        .rank-header {
            font-weight: 800;
            font-size: 1.2rem;
            padding: 0.3rem 0;
            margin-bottom: 0.6rem;
            border-left: 3px solid;
            padding-left: 0.6rem;
            letter-spacing: 1px;
        }
        .rank-header.low {
            border-left-color: #3a3a3a;
            color: #aaa;
        }
        .rank-header.mid {
            border-left-color: #8a8a8a;
            color: #c0c0c0;
        }
        .rank-header.high {
            border-left-color: #ffffff;
            color: #fff;
            text-shadow: 0 0 4px rgba(255,255,255,0.5);
        }
        .exploit-side-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .exploit-side-list li {
            padding: 0.4rem 0.4rem 0.4rem 0.8rem;
            margin-bottom: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s ease;
            border-left: 2px solid transparent;
            font-weight: 500;
        }
        .exploit-side-list li:hover {
            background-color: #151515;
            border-left-color: #8a8a8a;
            padding-left: 1rem;
        }

        /* карточки */
        .exploit-card {
            background-color: #0a0a0a;
            border: 1px solid #2c2c2c;
            padding: 1.4rem 1.8rem;
            transition: border 0.2s ease, background 0.2s;
            margin-bottom: 2rem;
            scroll-margin-top: 1rem;
        }
        .exploit-card:hover {
            border-color: #5a5a5a;
            background-color: #0f0f0f;
        }

        .exploit-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .exploit-name {
            font-family: 'Yu Gothic', 'YuGothic', sans-serif;
            font-weight: 800;
            font-size: 1.9rem;
            letter-spacing: 0.5px;
            color: #ffffff;
            border-left: 3px solid #aaa;
            padding-left: 0.8rem;
            margin-bottom: 0;
        }
        .rank-badge {
            font-family: 'Yu Gothic', monospace;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 0.2rem 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: #111;
            border: 1px solid #333;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .rank-badge.none-badge-hidden {
            display: none;
        }
        .rank-low {
            background-color: #000000;
            color: #aaaaaa;
            border-color: #3a3a3a;
        }
        .rank-mid {
            background-color: #1a1a1a;
            color: #d0d0d0;
            border-color: #5a5a5a;
        }
        .rank-high {
            background-color: #000000;
            color: #ffffff;
            border-color: #cccccc;
            box-shadow: 0 0 6px rgba(200,200,200,0.6), 0 0 2px rgba(255,255,255,0.8);
            text-shadow: 0 0 2px rgba(255,255,255,0.5);
        }

        .code-meta {
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 0.85rem;
            background-color: #050505;
            color: #cfcfcf;
            padding: 0.3rem 0.6rem;
            display: inline-block;
            margin: 0.25rem 0 0.3rem 0;
            border-left: 2px solid #3a3a3a;
            font-weight: 500;
        }

        .code-block {
            background-color: #010101;
            border: 1px solid #2a2a2a;
            padding: 1rem 1.2rem;
            font-family: 'SF Mono', monospace;
            font-size: 0.9rem;
            color: #dddddd;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: auto;
            margin: 0.5rem 0 0.6rem 0;
            line-height: 1.6;
        }

        /* Стили для ссылок (DSLink, DownLink, LoadLink) */
        .link-row {
            margin: 0.5rem 0 0.2rem 0;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.85rem;
            background-color: #080808;
            padding: 0.3rem 0.6rem;
            border-left: 2px solid #3a3a3a;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.5rem;
        }
        .link-label {
            font-weight: 700;
            color: #bbb;
            letter-spacing: 0.5px;
        }
        .link-value {
            color: #ddd;
            word-break: break-all;
            font-family: 'SF Mono', monospace;
        }
        .link-value a {
            color: #6aa9ff;
            text-decoration: none;
            border-bottom: 1px dotted #4a6a9a;
        }
        .link-value a:hover {
            color: white;
            border-bottom-color: white;
        }
        .loadlink-text {
            font-family: 'SF Mono', monospace;
            background-color: #000;
            padding: 0.2rem 0.4rem;
            color: #bada55;
        }

        .plus-minus {
            font-size: 0.8rem;
            color: #aaa;
        }

        .highlight {
            background-color: #2a2a2a;
            color: #ffffff;
            border-radius: 2px;
        }

        .exploit-card.hidden-by-search {
            display: none;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
            background: #1a1a1a;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #444;
        }

        @media (max-width: 950px) {
            .master-layout {
                flex-direction: column;
            }
            .tabs-vertical {
                width: 100%;
                display: flex;
                flex-direction: row;
                overflow-x: auto;
                position: relative;
                top: 0;
                gap: 4px;
                padding: 0.5rem;
            }
            .tab-btn {
                text-align: center;
                width: auto;
                border-left: none;
                border-bottom: 2px solid transparent;
            }
            .tab-btn.active {
                border-left-color: transparent;
                border-bottom-color: white;
            }
            .right-zone {
                flex-direction: column;
            }
            .sidebar {
                position: relative;
                max-height: none;
            }
        }
    </style>
</head>
<body>
<div class="master-layout">
    <div class="tabs-vertical">
        <button class="tab-btn active" data-tab="exploits">Exploits</button>
        <button class="tab-btn" data-tab="scripts">Scripts</button>
        <button class="tab-btn" data-tab="functions">Functions</button>
        <button class="tab-btn" data-tab="methods">Methods</button>
    </div>

    <div class="right-zone">
        <div class="content" id="dynamicContent">
            <div style="text-align: center; padding: 3rem;">Loading catalog...</div>
        </div>

        <div class="sidebar" id="sidebarPanel">
            <div class="search-section">
                <h3>Search</h3>
                <input type="text" id="searchInput" placeholder="Search in current tab..." autocomplete="off">
            </div>
            <div class="rank-filter-section">
                <h3>Rank visibility</h3>
                <div class="rank-filter-buttons" id="rankFilterButtons">
                    <button class="rank-filter-btn" data-filter="all">All</button>
                    <button class="rank-filter-btn" data-filter="low">Low</button>
                    <button class="rank-filter-btn" data-filter="mid">Mid</button>
                    <button class="rank-filter-btn" data-filter="high">High</button>
                </div>
            </div>
            <div id="rankSidebarContainer">
                <!-- динамические списки low/mid/high (только для Exploits) -->
            </div>
        </div>
    </div>
</div>

<script>
    // Discord server link (постоянная ссылка)
    const DISCORD_LINK = "https://discord.gg/exploitshub";
    
    // Пример ссылок для демонстрации (DownLink и DSLink — вы сможете заменить на свои)
    // Для каждого эксплоита разные ссылки (для наглядности)
    // В реальности вы можете проставить свои значения
    const exploitsData = [
        { name: "Swift", rank: "Low", sUNC: "98%", code: "[-] discontinued\n", rate: "0/100", noSigns: true },
        { name: "Solara", rank: "low", sUNC: "~35%", code: "[----] dont work\n[-] this is shit\n[-] no upd", rate: "0/100", features: "[-] not updated", dsLink: "", downLink: "" },
        { name: "JJsploit", rank: "low", sUNC: "~30%", code: "[+-] public API (but this API is shit)\n[-] after attach instant ban for 6+ months\n[-] very bad sUNC\n[-] rare release upd", rate: "-67/100", features: "[-] instant ban", dsLink: "", downLink: "https://wearedevs.net/d/JJSploit" },
        { name: "Xeno", rank: "mid", sUNC: "~40%", code: "[-] dont support many functions\n[-] dont support many scripts\n[-] dont support Remote Spy and Decompilers\n[+] fast attach\n[+] good for lowkey farm\n[+] keyless", rate: "40/100", features: "[+] upd / [-] low sUNC", dsLink: "https://discord.gg/xe-no", downLink: "https://www.xeno.now/download" },
        { name: "Madium", rank: "high", sUNC: "100%", code: "[+] high UNC\n[+] keyless\n[+] fast attach\n[-] bad author (Olemad) maybe malware", rate: "95/100", features: "[+] very good sUNC", dsLink: "https://discord.gg/olemad", downLink: "" },
        { name: "Velocity", rank: "high", sUNC: "98%", code: "[+] good sUNC\n[+] keyless\n[+] good author\n[+] fast update\n[+] public API + docs\n[-] sometimes crashes", rate: "100+/100", features: "[+] good author + fast upd", dsLink: "https://discord.gg/velocityide", downLink: "" },
        { name: "Potassium", rank: "high", sUNC: "100%", code: "[+] lifetime key\n[+] own docs for functions\n[+] extra fast upd\n[-] key required (22.99$)", rate: "100/100", features: "[+] full docs", dsLink: "https://discord.gg/potassium", downLink: "" }
    ];

    // для Scripts — добавим поле loadLink (просто текст/код или команда)
    const scriptsData = [
        { name: "Remote Spy", rank: "none", code: "simple script for script making. Shows a list with hooked remote events with args to it", noSigns: true, loadLink: 'loadstring(game:HttpGetAsync("https://raw.githubusercontent.com/78n/SimpleSpy/main/SimpleSpyBeta.lua"))()' },
        { name: "Dex Explorer", rank: "none", code: "simple script for script making. Shows the ui with all files in the game", noSigns: true, loadLink: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/Babyhamsta/RBLX_Scripts/main/Universal/BypassedDarkDexV3.lua", true))()' }
    ];

    const functionsData = [
        { name: "debug", rank: "none", code: "for change the script inside value and getting info for localscripts", noSigns: true },
        { name: "loadstring", rank: "none", code: "default function in the roblox for loading data from sites", noSigns: true }
    ];

    const methodsData = [
        { name: "FFlag Injection Method", rank: "none", code: "use FFlag for bypass byfron and more", noSigns: true },
        { name: "Downgrade Roblox", rank: "none", code: "use old version roblox !BANNABLE!. The site: https://rdd.weao.gg/?channel=LIVE&binaryType=WindowsPlayer&version={put here the rbx version u want}", noSigns: true },
        { name: "FE Method", rank: "none", code: "This is the oldest and very first vulnerability of Roblox. U can run any code serversided via this: game.FilteringEnabled = false, but now that fixed", noSigns: true },
        { name: "Backdoor Method", rank: "none", code: "find the backdoors in the games or put backdoor by force", noSigns: true }
    ];

    let currentTab = "exploits";
    let currentCards = [];
    let currentRankFilter = "all";

    function getRankBadgeClass(rank) {
        if (rank === "low") return "rank-low";
        if (rank === "mid") return "rank-mid";
        if (rank === "high") return "rank-high";
        return "";
    }

    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) { 
            if(m === '&') return '&amp;'; 
            if(m === '<') return '&lt;'; 
            if(m === '>') return '&gt;'; 
            return m;
        }); 
    }

    // Добавляем блок ссылок: DSLink (Discord) и DownLink (Download) для эксплоитов
    function renderLinkBlock(dsLink, downLink, isExploit = true) {
        let html = '';
        if (isExploit) {
            if (dsLink) {
                html += `<div class="link-row"><span class="link-label">Discord:</span> <span class="link-value"><a href="${escapeHtml(dsLink)}" target="_blank" rel="noopener noreferrer">${escapeHtml(dsLink)}</a></span></div>`;
            } else {
                html += `<div class="link-row"><span class="link-label">Discord:</span> <span class="link-value">None</span></div>`;
            }
            if (downLink) {
                html += `<div class="link-row"><span class="link-label">Download:</span> <span class="link-value"><a href="${escapeHtml(downLink)}" target="_blank" rel="noopener noreferrer">${escapeHtml(downLink)}</a></span></div>`;
            } else {
                html += `<div class="link-row"><span class="link-label">Download:</span> <span class="link-value">None</span></div>`;
            }
        }
        return html;
    }

    // Для скриптов: loadlink (просто текст)
    function renderLoadLink(loadLink) {
        if (loadLink) {
            return `<div class="link-row"><span class="link-label"></span> <span class="link-value loadlink-text">${escapeHtml(loadLink)}</span></div>`;
        }
        return `<div class="link-row"><span class="link-label"></span> <span class="link-value">— нет —</span></div>`;
    }

    function renderFullCard(item, hasSunc = true, showRate = true, isExploit = true) {
        const cardDiv = document.createElement('div');
        cardDiv.className = `exploit-card`; 
        cardDiv.setAttribute('data-rank', item.rank);
        const searchableText = `${item.name} ${item.code} ${item.features || ''} ${item.rate || ''} ${hasSunc ? (item.sUNC || '') : ''}`.toLowerCase();
        cardDiv.setAttribute('data-search-text', searchableText);
        
        let suncHtml = '';
        if (hasSunc && item.sUNC) suncHtml = `<div class="code-meta">sUNC: ${escapeHtml(item.sUNC)}</div>`;
        let rateHtml = '';
        if (showRate && item.rate) rateHtml = `<div class="code-meta">Rate: ${escapeHtml(item.rate)}</div>`;
        
        // Блок ссылок для эксплоитов: DSLink + DownLink (размещаются между rate и features)
        let linksHtml = '';
        if (isExploit) {
            linksHtml = renderLinkBlock(item.dsLink, item.downLink, true);
        } else if (currentTab === 'scripts' && item.loadLink) {
            linksHtml = renderLoadLink(item.loadLink);
        }
        
        cardDiv.innerHTML = `
            <div class="exploit-header">
                <div class="exploit-name">${escapeHtml(item.name)}</div>
                <div class="rank-badge ${getRankBadgeClass(item.rank)}" data-rank-value="${item.rank}">${item.rank.toUpperCase()}</div>
            </div>
            ${suncHtml}
            <div class="code-block">${escapeHtml(item.code)}</div>
            ${rateHtml}
            ${linksHtml}
            ${item.features ? `<div class="code-meta plus-minus">${escapeHtml(item.features)}</div>` : ''}
        `;
        return cardDiv;
    }
    
    function renderFunctionCard(item) {
        const cardDiv = document.createElement('div');
        cardDiv.className = `exploit-card`;
        cardDiv.setAttribute('data-rank', item.rank);
        const searchableText = `${item.name} ${item.code}`.toLowerCase();
        cardDiv.setAttribute('data-search-text', searchableText);
        cardDiv.innerHTML = `
            <div class="exploit-header">
                <div class="exploit-name">${escapeHtml(item.name)}</div>
                <div class="rank-badge ${getRankBadgeClass(item.rank)}" data-rank-value="${item.rank}">${item.rank.toUpperCase()}</div>
            </div>
            <div class="code-block">${escapeHtml(item.code)}</div>
        `;
        return cardDiv;
    }

    // Применение фильтра рангов
    function applyRankFilter() {
        if (!currentCards.length) return;
        
        const filter = currentRankFilter;
        currentCards.forEach(card => {
            const cardRank = card.getAttribute('data-rank');
            const badge = card.querySelector('.rank-badge');
            
            if (filter === 'none') {
                if (badge) badge.style.display = 'none';
                if (!card.classList.contains('hidden-by-search')) {
                    card.style.display = '';
                }
            } 
            else if (filter === 'all') {
                if (badge) badge.style.display = '';
                if (!card.classList.contains('hidden-by-search')) {
                    card.style.display = '';
                } else {
                    card.style.display = '';
                }
            }
            else {
                if (badge) badge.style.display = '';
                const isRankMatch = (cardRank === filter);
                if (!card.classList.contains('hidden-by-search')) {
                    card.style.display = isRankMatch ? '' : 'none';
                } else {
                    card.style.display = 'none';
                }
            }
        });
        
        const sidebarRankContainer = document.getElementById('rankSidebarContainer');
        if (sidebarRankContainer) {
            if (filter === 'none') {
                sidebarRankContainer.style.display = 'none';
            } else {
                sidebarRankContainer.style.display = '';
                if (currentTab === 'exploits') {
                    rebuildSidebarOnlyForExploits();
                } else {
                    sidebarRankContainer.innerHTML = '';
                }
            }
        }
        
        const notFoundDiv = document.getElementById('globalNotFound');
        if (notFoundDiv && filter !== 'none') {
            let hasVisible = false;
            currentCards.forEach(c => { if (c.style.display !== 'none' && !c.classList.contains('hidden-by-search')) hasVisible = true; });
            if (!hasVisible && searchInputElem && searchInputElem.value.trim() !== '') {
                notFoundDiv.style.display = '';
            } else if (notFoundDiv) notFoundDiv.style.display = 'none';
        } else if (notFoundDiv) notFoundDiv.style.display = 'none';
    }

    function rebuildSidebarOnlyForExploits() {
        const sidebarContainer = document.getElementById('rankSidebarContainer');
        if (!sidebarContainer) return;
        if (currentTab !== 'exploits' || currentRankFilter === 'none') {
            if (currentRankFilter !== 'none') sidebarContainer.innerHTML = '';
            return;
        }
        
        const lowItems = [], midItems = [], highItems = [];
        currentCards.forEach(card => {
            if (card.classList.contains('hidden-by-search')) return;
            const nameEl = card.querySelector('.exploit-name');
            const name = nameEl ? nameEl.innerText : 'unknown';
            const rank = card.getAttribute('data-rank');
            if (rank === 'low') lowItems.push({ name, card });
            else if (rank === 'mid') midItems.push({ name, card });
            else if (rank === 'high') highItems.push({ name, card });
        });
        
        function buildSection(rankType, title, itemsArray, headerClass) {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'rank-section';
            sectionDiv.innerHTML = `<div class="rank-header ${headerClass}">▸ ${title}</div><ul class="exploit-side-list" id="sideList-${rankType}"></ul>`;
            const listUl = sectionDiv.querySelector(`ul`);
            if (itemsArray.length === 0) {
                const emptyLi = document.createElement('li');
                emptyLi.textContent = '— нет элементов —';
                emptyLi.style.opacity = '0.6';
                emptyLi.style.cursor = 'default';
                listUl.appendChild(emptyLi);
            } else {
                itemsArray.forEach(({ name, card }) => {
                    const li = document.createElement('li');
                    li.textContent = name;
                    li.addEventListener('click', (e) => {
                        e.stopPropagation();
                        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        card.style.transition = 'box-shadow 0.2s';
                        card.style.boxShadow = '0 0 0 2px #7a7a7a';
                        setTimeout(() => card.style.boxShadow = '', 800);
                    });
                    listUl.appendChild(li);
                });
            }
            return sectionDiv;
        }
        
        sidebarContainer.innerHTML = '';
        sidebarContainer.appendChild(buildSection('low', 'LOW', lowItems, 'low'));
        sidebarContainer.appendChild(buildSection('mid', 'MID', midItems, 'mid'));
        sidebarContainer.appendChild(buildSection('high', 'HIGH', highItems, 'high'));
    }

    function renderContentByTab(tab) {
        const container = document.getElementById('dynamicContent');
        if (!container) return;
        container.innerHTML = '';
        let items = [], renderFunc = null;
        let isExploitTab = false;
        
        if (tab === 'exploits') { items = exploitsData; renderFunc = (item) => renderFullCard(item, true, true, true); isExploitTab = true; }
        else if (tab === 'scripts') { items = scriptsData; renderFunc = (item) => renderFullCard(item, false, false, false); }
        else if (tab === 'functions') { items = functionsData; renderFunc = (item) => renderFunctionCard(item); }
        else if (tab === 'methods') { items = methodsData; renderFunc = (item) => renderFullCard(item, false, false, false); }
        
        if (!items.length) {
            container.innerHTML = '<div style="text-align:center;padding:2rem;">No entries</div>';
            currentCards = [];
            if(currentTab !== 'exploits') document.getElementById('rankSidebarContainer').innerHTML = '';
            applyRankFilter();
            return;
        }
        
        const fragment = document.createDocumentFragment();
        items.forEach(item => { fragment.appendChild(renderFunc(item)); });
        container.appendChild(fragment);
        currentCards = Array.from(document.querySelectorAll('#dynamicContent .exploit-card'));
        
        applyRankFilter();
        if (currentTab === 'exploits' && currentRankFilter !== 'none') rebuildSidebarOnlyForExploits();
        else if (currentTab !== 'exploits') document.getElementById('rankSidebarContainer').innerHTML = '';
        attachSearchFunctionality();
    }
    
    let searchInputElem = null;
    function attachSearchFunctionality() {
        if (!searchInputElem) searchInputElem = document.getElementById('searchInput');
        if (!searchInputElem) return;
        
        const searchHandler = () => {
            const term = searchInputElem.value.trim().toLowerCase();
            if (!currentCards.length) return;
            let anyVisible = false;
            currentCards.forEach(card => {
                const searchText = card.getAttribute('data-search-text') || '';
                if (term === '') {
                    card.classList.remove('hidden-by-search');
                    anyVisible = true;
                    removeHighlightsInCard(card);
                } else {
                    if (searchText.includes(term)) {
                        card.classList.remove('hidden-by-search');
                        anyVisible = true;
                        highlightTextInCard(card, term);
                    } else {
                        card.classList.add('hidden-by-search');
                        removeHighlightsInCard(card);
                    }
                }
            });
            const notFoundDiv = document.getElementById('globalNotFound');
            if (!anyVisible && term !== '') {
                if (!notFoundDiv) {
                    const msgDiv = document.createElement('div');
                    msgDiv.id = 'globalNotFound';
                    msgDiv.style.textAlign = 'center';
                    msgDiv.style.padding = '1rem';
                    msgDiv.style.color = '#777';
                    document.getElementById('dynamicContent')?.appendChild(msgDiv);
                }
                const msg = document.getElementById('globalNotFound');
                if (msg) msg.innerText = `Nothing found for "${term}"`;
            } else if (notFoundDiv) notFoundDiv.remove();
            
            applyRankFilter();
            if (currentTab === 'exploits' && currentRankFilter !== 'none') rebuildSidebarOnlyForExploits();
        };
        searchInputElem.oninput = searchHandler;
    }
    
    function highlightTextInCard(card, term) {
        removeHighlightsInCard(card);
        if (!term) return;
        const walker = document.createTreeWalker(card, NodeFilter.SHOW_TEXT, { acceptNode: (node) => {
            if (node.parentElement.tagName === 'SCRIPT' || node.parentElement.tagName === 'STYLE') return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
        }});
        const nodes = [];
        while(walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(node => {
            if (node.textContent && node.textContent.toLowerCase().includes(term)) {
                const span = document.createElement('span');
                const regex = new RegExp(`(${escapeRegex(term)})`, 'gi');
                span.innerHTML = node.textContent.replace(regex, `<span class="highlight">$1</span>`);
                node.parentNode.replaceChild(span, node);
            }
        });
    }
    function removeHighlightsInCard(card) {
        card.querySelectorAll('.highlight').forEach(span => {
            const parent = span.parentNode;
            if (parent) { parent.replaceChild(document.createTextNode(span.textContent), span); parent.normalize(); }
        });
    }
    function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    
    function initRankFilterButtons() {
        const container = document.getElementById('rankFilterButtons');
        if (!container) return;
        const buttons = container.querySelectorAll('.rank-filter-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const filterValue = btn.getAttribute('data-filter');
                if (!filterValue) return;
                currentRankFilter = filterValue;
                buttons.forEach(b => b.classList.remove('active-filter'));
                btn.classList.add('active-filter');
                applyRankFilter();
                if (currentTab === 'exploits' && currentRankFilter !== 'none') rebuildSidebarOnlyForExploits();
                else if (currentTab === 'exploits' && currentRankFilter === 'none') {
                    const sidebarContainer = document.getElementById('rankSidebarContainer');
                    if (sidebarContainer) sidebarContainer.innerHTML = '';
                } else if (currentTab !== 'exploits') {
                    document.getElementById('rankSidebarContainer').innerHTML = '';
                }
            });
        });
        const allBtn = container.querySelector('[data-filter="all"]');
        if (allBtn) allBtn.classList.add('active-filter');
    }
    
    function initTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                if (!tabId) return;
                currentTab = tabId;
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (searchInputElem) searchInputElem.value = '';
                renderContentByTab(currentTab);
            });
        });
    }
    
    renderContentByTab('exploits');
    initTabs();
    initRankFilterButtons();
    setTimeout(() => {
        applyRankFilter();
        if (currentTab === 'exploits') rebuildSidebarOnlyForExploits();
        attachSearchFunctionality();
    }, 20);
</script>
</body>
